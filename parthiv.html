// ─── COLOURS ─────────────────────────────────────────────────────────────────

const COLOR_MAP = {
  gray:   { bg: "#F1EFE8", border: "#888780", text: "#2C2C2A", light: "#D3D1C7" },
  amber:  { bg: "#FAEEDA", border: "#BA7517", text: "#412402", light: "#FAC775" },
  purple: { bg: "#EEEDFE", border: "#534AB7", text: "#26215C", light: "#CECBF6" },
  teal:   { bg: "#E1F5EE", border: "#0F6E56", text: "#04342C", light: "#9FE1CB" },
  green:  { bg: "#EAF3DE", border: "#3B6D11", text: "#173404", light: "#C0DD97" },
  coral:  { bg: "#FAECE7", border: "#993C1D", text: "#4A1B0C", light: "#F5C4B3" },
  blue:   { bg: "#E6F1FB", border: "#185FA5", text: "#042C53", light: "#B5D4F4" },

// ─── TINY HELPERS ────────────────────────────────────────────────────────────

const cx = (...classes) => classes.filter(Boolean).join(" ");

function useAnimatedMount() {
  const [visible, setVisible] = useState(false);
  useEffect(() => { const t = setTimeout(() => setVisible(true), 30); return () => clearTimeout(t); }, []);
  return visible;
}

function Badge({ color, children }) {
  const c = COLOR_MAP[color] || COLOR_MAP.gray;
  return (
    <span style={{
      display: "inline-block", fontSize: 10, fontWeight: 600,
      padding: "2px 8px", borderRadius: 20,
      background: c.bg, color: c.text, border: `1px solid ${c.light}`,
    }}>
      {children}
    </span>
  );
}

function SectionLabel({ children, style }) {
  return (
    <p style={{
      fontSize: 10, fontWeight: 700, letterSpacing: ".08em",
      textTransform: "uppercase", color: "var(--color-text-tertiary)",
      marginBottom: 10, ...style,
    }}>
      {children}
    </p>
  );
}

function Card({ children, style, onClick, hover }) {
  const [hov, setHov] = useState(false);
  return (
    <div
      onClick={onClick}
      onMouseEnter={() => hover && setHov(true)}
      onMouseLeave={() => hover && setHov(false)}
      style={{
        background: "var(--color-background-primary)",
        border: "0.5px solid var(--color-border-tertiary)",
        borderRadius: 12,
        padding: "14px 16px",
        cursor: onClick ? "pointer" : "default",
        transition: "box-shadow .15s, transform .15s",
        boxShadow: hov ? "0 4px 16px rgba(0,0,0,.08)" : "none",
        transform: hov ? "translateY(-1px)" : "none",
        ...style,
      }}
    >
      {children}
    </div>
  );
}

            style={{

              border: "0.5px solid transparent",

// ─── FLOW PANEL ──────────────────────────────────────────────────────────────

function getCenter(node) {
  return { x: node.x + node.w / 2, y: node.y + node.h / 2 };
}

function FlowPanel() {
  const [hovered, setHovered] = useState(null);
  const visible = useAnimatedMount();

  const nodeMap = Object.fromEntries(FLOW_NODES.map(n => [n.id, n]));

  function arrowPath(arrow) {
    const from = nodeMap[arrow.from];
    const to   = nodeMap[arrow.to];
    if (!from || !to) return "";
    const fc = getCenter(from);
    const tc = getCenter(to);
    if (arrow.via) {
      return `M ${fc.x} ${from.y + from.h} L ${arrow.via.x} ${arrow.via.y} L ${tc.x} ${to.y}`;
    }
    return `M ${fc.x} ${from.y + from.h} L ${tc.x} ${to.y}`;
  }

  return (
    <div style={{ opacity: visible ? 1 : 0, transition: "opacity .3s" }}>
      <SectionLabel>Primary user flow — onboarding → daily check-in</SectionLabel>
      <div style={{ overflowX: "auto" }}>
        <svg width="100%" viewBox="0 0 720 400" role="img">
          <title>User flow diagram for habit tracker</title>
          <desc>Path from app launch through onboarding, daily check-in, and end states.</desc>
          <defs>
            <marker id="flarrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
              <path d="M2 1L8 5L2 9" fill="none" stroke="#888" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
            </marker>
          </defs>

          {/* Arrows */}
          {FLOW_ARROWS.map((arr, i) => {
            const from = nodeMap[arr.from];
            const to   = nodeMap[arr.to];
            if (!from || !to) return null;
            const d = arrowPath(arr);
            const fc = getCenter(from);
            const tc = getCenter(to);
            const midX = arr.via ? arr.via.x + 12 : (fc.x + tc.x) / 2 + 8;
            const midY = arr.via ? arr.via.y - 8 : (from.y + from.h + to.y) / 2;
            return (
              <g key={i}>
                <path d={d} fill="none" stroke="var(--color-border-secondary)" strokeWidth="1.5" markerEnd="url(#flarrow)" />
                {arr.label && (
                  <text x={midX} y={midY} fontSize={10} fill="var(--color-text-tertiary)" textAnchor="middle" fontFamily="var(--font-sans)">{arr.label}</text>
                )}
              </g>
            );
          })}

          {/* Nodes */}
          {FLOW_NODES.map(node => {
            const c = COLOR_MAP[node.color];
            const isHov = hovered === node.id;
            return (
              <g
                key={node.id}
                style={{ cursor: "pointer" }}
                onMouseEnter={() => setHovered(node.id)}
                onMouseLeave={() => setHovered(null)}
              >
                <rect
                  x={node.x} y={node.y} width={node.w} height={node.h} rx={node.rx}
                  fill={c.bg} stroke={isHov ? c.border : c.light} strokeWidth={isHov ? 1.5 : 1}
                  style={{ transition: "stroke .15s" }}
                />
                <text
                  x={node.x + node.w / 2} y={node.sub ? node.y + node.h * 0.36 : node.y + node.h / 2}
                  textAnchor="middle" dominantBaseline="central"
                  fontSize={12} fontWeight={600} fill={c.text} fontFamily="var(--font-sans)"
                >
                  {node.label}
                </text>
                {node.sub && (
                  <text
                    x={node.x + node.w / 2} y={node.y + node.h * 0.66}
                    textAnchor="middle" dominantBaseline="central"
                    fontSize={10} fill={c.border} fontFamily="var(--font-sans)"
                  >
                    {node.sub}
                  </text>
                )}
              </g>
            );
          })}

          {/* Legend */}
          {Object.entries({ Onboarding: "purple", "Core screens": "teal", Decisions: "amber", "End states": "green" }).map(([label, color], i) => {
            const c = COLOR_MAP[color];
            return (
              <g key={label}>
                <rect x={20} y={20 + i * 16} width={10} height={10} rx={2} fill={c.bg} stroke={c.border} strokeWidth={0.8} />
                <text x={36} y={29 + i * 16} fontSize={10} fill="var(--color-text-tertiary)" fontFamily="var(--font-sans)">{label}</text>
              </g>
            );
          })}
        </svg>
      </div>
      <p style={{ fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 6 }}>Hover any node to highlight it.</p>
    </div>
  );
}

      height: 38, background: "var(--color-background-secondary)",
      borderBottom: "0.5px solid var(--color-border-tertiary)",
      display: "flex", alignItems: "center", padding: "0 10px",
    }}>
      <div style={{ width: 22, height: 22, borderRadius: 5, background: "var(--color-border-tertiary)" }} />
      <div style={{ flex: 1, textAlign: "center", fontSize: 11, fontWeight: 600, color: "var(--color-text-primary)" }}>{title}</div>
      <div style={{ width: 22, height: 22, borderRadius: 5, background: "var(--color-border-tertiary)" }} />
    </div>
  );
}

function WfTabBar({ active = 0 }) {
  return (
    <div style={{
      position: "absolute", bottom: 0, left: 0, right: 0,
      height: 42, background: "var(--color-background-primary)",
      borderTop: "0.5px solid var(--color-border-tertiary)",
      display: "flex",
    }}>
      {[0, 1, 2].map(i => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 3 }}>
          <div style={{ width: 18, height: 3, borderRadius: 2, background: i === active ? "var(--color-text-info)" : "var(--color-border-tertiary)" }} />
          <div style={{ width: 10, height: 2, borderRadius: 1, background: i === active ? "var(--color-text-info)" : "var(--color-border-tertiary)" }} />
        </div>
      ))}
    </div>
  );
}

function WfLine({ w = "100%", h = 5, style }) {
  return <div style={{ height: h, background: "var(--color-border-tertiary)", borderRadius: 3, width: w, ...style }} />;
}

function ScreenOnboarding() {
  return (
    <div>
      <WfBar title="Welcome" />
      <div style={{ padding: "10px 10px 0" }}>
        <div style={{ height: 5, background: "var(--color-background-info)", borderRadius: 3, marginBottom: 4 }}>
          <div style={{ width: "33%", height: "100%", background: "var(--color-text-info)", borderRadius: 3 }} />
        </div>
        <div style={{ fontSize: 8, color: "var(--color-text-tertiary)", textAlign: "right", marginBottom: 10 }}>Step 1 of 3</div>
        <div style={{ textAlign: "center", marginBottom: 10 }}>
          <WfLine w="80%" style={{ margin: "0 auto 4px" }} />
          <WfLine w="60%" style={{ margin: "0 auto" }} />
        </div>
        <div style={{ height: 28, border: "0.5px solid var(--color-border-secondary)", borderRadius: 6, display: "flex", alignItems: "center", padding: "0 8px", marginBottom: 10 }}>
          <span style={{ fontSize: 8, color: "var(--color-text-tertiary)" }}>Your name</span>
        </div>
        <div style={{ fontSize: 8, color: "var(--color-text-tertiary)", marginBottom: 5 }}>Pick your first habit</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 10 }}>
          {[true, false, false, false].map((sel, i) => (
            <div key={i} style={{
              height: 38, background: sel ? COLOR_MAP.teal.bg : "var(--color-background-secondary)",
              border: `0.5px solid ${sel ? COLOR_MAP.teal.border : "var(--color-border-tertiary)"}`,
              borderRadius: 7, display: "flex", alignItems: "center", gap: 6, padding: "0 7px",
            }}>
              <div style={{ width: 12, height: 12, borderRadius: 3, background: sel ? COLOR_MAP.teal.border : "var(--color-border-tertiary)" }} />
              <WfLine w="60%" h={4} />
            </div>
          ))}
        </div>
        <div style={{ height: 30, background: "var(--color-background-info)", borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontSize: 9, fontWeight: 600, color: "var(--color-text-info)" }}>Continue →</span>
        </div>
      </div>
    </div>
  );
}

function ScreenHome() {
  return (
    <div style={{ position: "relative", minHeight: 360 }}>
      <WfBar title="Today" />
      <div style={{ padding: "8px 10px" }}>
        <div style={{ background: "var(--color-background-secondary)", borderRadius: 10, padding: 10, marginBottom: 8, border: "0.5px solid var(--color-border-tertiary)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <WfLine w={55} />
            <div style={{ height: 16, width: 36, background: "var(--color-background-info)", borderRadius: 8 }} />
          </div>
          <div style={{ height: 8, background: "var(--color-border-tertiary)", borderRadius: 4 }}>
            <div style={{ width: "60%", height: "100%", background: "#639922", borderRadius: 4 }} />
          </div>
          <div style={{ fontSize: 7, color: "var(--color-text-tertiary)", textAlign: "right", marginTop: 2 }}>3 / 5 done</div>
        </div>
        <div style={{ fontSize: 8, textTransform: "uppercase", letterSpacing: ".05em", color: "var(--color-text-tertiary)", marginBottom: 4 }}>Your habits</div>
      </div>
      {[{ done: true }, { done: false }, { done: false }, { done: false, locked: true }].map((item, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", borderBottom: "0.5px solid var(--color-border-tertiary)", opacity: item.locked ? 0.45 : 1 }}>
          <div style={{
            width: 20, height: 20, borderRadius: "50%",
            border: `0.5px solid var(--color-border-secondary)`,
            background: item.done ? "#EAF3DE" : "transparent",
            display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
          }}>
            {item.done && <div style={{ width: 10, height: 10, borderRadius: "50%", background: "#639922" }} />}
          </div>
          <div style={{ flex: 1 }}>
            <WfLine w="75%" h={5} style={{ marginBottom: 3 }} />
            <WfLine w="50%" h={4} />
          </div>
          {item.done && <span style={{ fontSize: 8, color: "#639922" }}>✓</span>}
          {item.locked && <span style={{ fontSize: 7, color: "var(--color-text-tertiary)" }}>later</span>}
        </div>
      ))}
      <WfTabBar active={0} />
    </div>
  );
}

function ScreenCheckin() {
  return (
    <div style={{ position: "relative", minHeight: 360 }}>
      <WfBar title="Check in" />
      <div style={{ padding: "8px 10px 0", textAlign: "center", marginBottom: 6 }}>
        <WfLine w="70%" style={{ margin: "0 auto 3px" }} />
        <WfLine w="50%" style={{ margin: "0 auto" }} />
      </div>
      <div style={{ padding: "0 10px" }}>
        <div style={{ background: "var(--color-background-secondary)", borderRadius: 10, padding: 10, marginBottom: 8, border: `0.5px solid ${COLOR_MAP.teal.border}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 7 }}>
            <div style={{ width: 26, height: 26, borderRadius: 7, background: COLOR_MAP.teal.bg }} />
            <div style={{ flex: 1 }}>
              <WfLine w="65%" h={5} style={{ marginBottom: 3 }} />
              <WfLine w="45%" h={4} />
            </div>
            <div style={{ width: 28, height: 28, borderRadius: "50%", background: COLOR_MAP.green.bg, border: `0.5px solid ${COLOR_MAP.green.border}` }} />
          </div>
          <div style={{ display: "flex", gap: 3, marginBottom: 5 }}>
            {[1, 1, 0, 1, 1, 0, 1].map((v, i) => (
              <div key={i} style={{ flex: 1, height: 14, borderRadius: 3, background: v ? COLOR_MAP.teal.bg : "var(--color-border-tertiary)", border: `0.5px solid ${v ? COLOR_MAP.teal.border : "var(--color-border-tertiary)"}` }} />
            ))}
          </div>
          <WfLine w="80%" h={4} />
        </div>
        <div style={{ height: 32, background: "var(--color-background-info)", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 6 }}>
          <span style={{ fontSize: 9, fontWeight: 600, color: "var(--color-text-info)" }}>Mark complete</span>
        </div>
        <div style={{ height: 26, border: "0.5px solid var(--color-border-secondary)", borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontSize: 9, color: "var(--color-text-secondary)" }}>Skip for today</span>
        </div>
      </div>
      <WfTabBar active={0} />
    </div>
  );
}

function ScreenProgress() {
  const bars = [0.4, 0.7, 0.5, 1, 0.8, 0.6, 0.9];
  const heatActive = new Set([0,1,3,4,5,7,8,9,10,12,13,14,15,16,18,19,21,22,24,25,26,27]);
  return (
    <div style={{ position: "relative", minHeight: 360 }}>
      <WfBar title="Progress" />
      <div style={{ padding: "8px 10px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 8 }}>
          {["Current streak", "Personal best"].map(label => (
            <div key={label} style={{ background: "var(--color-background-secondary)", borderRadius: 8, padding: 7, border: "0.5px solid var(--color-border-tertiary)" }}>
              <WfLine w={38} h={4} style={{ marginBottom: 4 }} />
              <WfLine w={24} h={10} />
            </div>
          ))}
        </div>
        <div style={{ fontSize: 7, textTransform: "uppercase", letterSpacing: ".05em", color: "var(--color-text-tertiary)", marginBottom: 4 }}>Last 7 days</div>
        <div style={{ display: "flex", gap: 3, alignItems: "flex-end", height: 40, marginBottom: 8 }}>
          {bars.map((h, i) => (
            <div key={i} style={{ flex: 1, height: `${h * 100}%`, background: COLOR_MAP.blue.bg, borderRadius: "3px 3px 0 0", border: `0.5px solid ${COLOR_MAP.blue.border}` }} />
          ))}
        </div>
        <div style={{ fontSize: 7, textTransform: "uppercase", letterSpacing: ".05em", color: "var(--color-text-tertiary)", marginBottom: 4 }}>Streak calendar</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2 }}>
          {Array.from({ length: 28 }, (_, i) => (
            <div key={i} style={{
              height: 13, borderRadius: 2,
              background: heatActive.has(i) ? COLOR_MAP.blue.bg : "var(--color-background-secondary)",
              border: `0.5px solid ${heatActive.has(i) ? COLOR_MAP.blue.border : "var(--color-border-tertiary)"}`,
            }} />
          ))}
        </div>
      </div>
      <WfTabBar active={2} />
    </div>
  );
}

const SCREEN_COMPONENTS = {
  onboarding: ScreenOnboarding,
  home:       ScreenHome,
  checkin:    ScreenCheckin,
  progress:   ScreenProgress,
};

function WireframesPanel() {
  const [activeScreen, setActiveScreen] = useState("onboarding");
  const visible = useAnimatedMount();
  const screen = SCREENS.find(s => s.id === activeScreen);
  const ScreenComp = SCREEN_COMPONENTS[activeScreen];

  return (
    <div style={{ opacity: visible ? 1 : 0, transition: "opacity .3s" }}>
      <SectionLabel>Lo-fi wireframes — key screens</SectionLabel>

      {/* Screen nav */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 20 }}>
        {SCREENS.map(s => (
          <button
            key={s.id}
            onClick={() => setActiveScreen(s.id)}
            style={{
              padding: "5px 12px", fontSize: 11, fontWeight: 600,
              border: "0.5px solid var(--color-border-secondary)", borderRadius: 20,
              background: activeScreen === s.id ? "var(--color-text-primary)" : "transparent",
              color: activeScreen === s.id ? "var(--color-background-primary)" : "var(--color-text-secondary)",
              cursor: "pointer", transition: "all .15s",
            }}
          >
            {s.label}
          </button>
        ))}
      </div>

      <div style={{ display: "flex", gap: 20, flexWrap: "wrap", alignItems: "flex-start" }}>
        {/* Phone */}
        <div style={{ width: 200, flexShrink: 0 }}>
          <div style={{
            border: "2px solid var(--color-border-primary)", borderRadius: 28,
            padding: "10px 8px", background: "var(--color-background-secondary)",
          }}>
            <div style={{ width: 56, height: 10, background: "var(--color-border-secondary)", borderRadius: 5, margin: "0 auto 8px" }} />
            <div style={{
              background: "var(--color-background-primary)", borderRadius: 18,
              minHeight: 360, overflow: "hidden", position: "relative",
            }}>
              <ScreenComp key={activeScreen} />
            </div>
          </div>
          <p style={{ textAlign: "center", fontSize: 11, color: "var(--color-text-tertiary)", marginTop: 8, fontWeight: 600 }}>
            {screen.label}
          </p>
        </div>

        {/* Annotations */}
        <div style={{
          flex: 1, minWidth: 160,
          background: "var(--color-background-primary)",
          border: "0.5px solid var(--color-border-tertiary)",
          borderRadius: 12, padding: 16,
        }}>
          <p style={{ fontSize: 13, fontWeight: 600, color: "var(--color-text-primary)", marginBottom: 12 }}>
            {screen.label} — design notes
          </p>
          {screen.annotations.map((ann, i) => (
            <div key={i} style={{ display: "flex", gap: 8, marginBottom: 10, alignItems: "flex-start" }}>
              <div style={{
                width: 18, height: 18, borderRadius: "50%",
                background: "var(--color-background-info)", color: "var(--color-text-info)",
                fontSize: 10, fontWeight: 700,
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1,
              }}>
                {i + 1}
              </div>
              <p style={{ fontSize: 12, color: "var(--color-text-secondary)", lineHeight: 1.5 }}>{ann}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── PROCESS PANEL ───────────────────────────────────────────────────────────

const PROCESS_STEPS = [
  { num: 1, title: "Empathize",  body: "5 user interviews, 40-person survey. Observed real app sessions. Mapped emotional journey.",       tag: "discovery", icon: "ti-ear" },
  { num: 2, title: "Define",     body: "Created 2 personas. Mapped pain points. Wrote HMW questions to frame design challenges.",           tag: "define",    icon: "ti-target" },
  { num: 3, title: "Ideate",     body: "Crazy-8 sketching, feature matrix, MoSCoW prioritisation. Narrowed to 3 concepts.",                tag: "ideate",    icon: "ti-brain" },
  { num: 4, title: "Prototype",  body: "Lo-fi wireframes in Figma. Focused on onboarding, daily check-in, and progress screens.",          tag: "prototype", icon: "ti-pencil" },
  { num: 5, title: "Test",       body: "3 rounds of usability testing. Measured time-to-first-check-in and task completion rate.",          tag: "test",      icon: "ti-test-pipe" },
];
const STAGE_COLOR = { discovery: "blue", define: "purple", ideate: "amber", prototype: "teal", test: "coral" };

function ProcessPanel() {
  const visible = useAnimatedMount();
  return (
    <div style={{ opacity: visible ? 1 : 0, transition: "opacity .3s" }}>
      <SectionLabel>Design thinking — double diamond</SectionLabel>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 10, marginBottom: 24 }}>
        {PROCESS_STEPS.map((step, i) => {
          const c = COLOR_MAP[STAGE_COLOR[step.tag]];
          return (
            <Card key={i} style={{ borderTop: `3px solid ${c.border}` }}>
              <div style={{
                width: 28, height: 28, borderRadius: "50%",
                background: c.bg, border: `1px solid ${c.border}`,
                display: "flex", alignItems: "center", justifyContent: "center",
                marginBottom: 8,
              }}>
                <i className={`ti ${step.icon}`} style={{ fontSize: 14, color: c.text }} />
              </div>
              <div style={{ fontSize: 13, fontWeight: 700, color: "var(--color-text-primary)", marginBottom: 4 }}>
                {step.num}. {step.title}
              </div>
              <div style={{ fontSize: 11, color: "var(--color-text-secondary)", lineHeight: 1.45 }}>{step.body}</div>
            </Card>
          );
        })}
      </div>

      <SectionLabel>Feature prioritisation (MoSCoW)</SectionLabel>
      <Card style={{ padding: 0, overflow: "hidden" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: "var(--color-background-secondary)" }}>
              {["Feature", "Priority", "Rationale"].map(h => (
                <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 700, fontSize: 11, color: "var(--color-text-secondary)", borderBottom: "0.5px solid var(--color-border-tertiary)" }}>
                  {h}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {MOSCOW.map((row, i) => {
              const c = COLOR_MAP[PRIORITY_COLOR[row.priority]];
              return (
                <tr key={i} style={{ borderBottom: i < MOSCOW.length - 1 ? "0.5px solid var(--color-border-tertiary)" : "none" }}>
                  <td style={{ padding: "10px 14px", color: "var(--color-text-primary)", fontWeight: 500 }}>{row.feature}</td>
                  <td style={{ padding: "10px 14px" }}>
                    <span style={{ fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 4, background: c.bg, color: c.text }}>
                      {row.priority}
                    </span>
                  </td>
                  <td style={{ padding: "10px 14px", color: "var(--color-text-secondary)", fontSize: 11 }}>{row.reason}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

// ─── ROOT ────────────────────────────────────────────────────────────────────

function App() {
  const [tab, setTab] = useState("research");

  const panels = {
    research:   <ResearchPanel />,
    personas:   <PersonasPanel />,
    flow:       <FlowPanel />,
    wireframes: <WireframesPanel />,
    process:    <ProcessPanel />,
  };

  return (
    <div style={{ fontFamily: "var(--font-sans)", padding: "1.5rem 0", maxWidth: 760, margin: "0 auto" }}>
      <style>{`
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        button { font-family: inherit; }
      `}</style>

      <TabBar active={tab} onChange={setTab} />

      <div key={tab} style={{ animation: "fadeIn .25s ease" }}>
        {panels[tab]}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
